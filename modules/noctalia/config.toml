[notification]
layer = "overlay"

[shell]
app_icon_colorize = true
corner_radius_scale = 0.2500000037252903
font_family = "Inter"
launch_apps_as_systemd_services = true
password_style = "random"
polkit_agent = true
settings_show_advanced = true

    [shell.panel]
    launcher_session_search = true
    open_near_click_control_center = true
    open_near_click_session = true
    open_near_click_wallpaper = true
    transparency_mode = "glass"

[templates]

[theme]
builtin = "Noctalia"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "vibrant"

    [theme.templates]
    community_ids = [ "spicetify", "zen-browser", "discord", "steam", "telegram", "yazi", "hyprtoolkit" ]

[wallpaper]
directory = "/mnt/bigdrive/Wallpapers/UW"
transition_on_startup = true

    [wallpaper.default]
    path = "/mnt/bigdrive/Wallpapers/UW/6.png"

    [wallpaper.last]
    path = "/mnt/bigdrive/Wallpapers/UW/6.png"

    [wallpaper.monitors.DP-2]
    path = "/mnt/bigdrive/Wallpapers/UW/6.png"

    [[wallpaper.favorite]]
    palette_source = "wallpaper"
    path = "/mnt/bigdrive/Wallpapers/UW/'Watching Clio and microTech set on Euterpe' screenshot from Star Citizen by mr-hasgaha.jpg"
    theme_mode = "dark"
    wallpaper_scheme = "m3-content"

    [[wallpaper.favorite]]
    path = "/mnt/bigdrive/Wallpapers/UW/17.jpg"
    theme_mode = "auto"

    [[wallpaper.favorite]]
    palette_source = "wallpaper"
    path = "/mnt/bigdrive/Wallpapers/UW/10.png"
    theme_mode = "dark"
    wallpaper_scheme = "vibrant"
