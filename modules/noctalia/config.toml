[bar.widgets]
auto_hide = true
center = [ "audio_visualizer", "active_window" ]
end = [ "media", "tray", "notifications", "clipboard", "bluetooth", "volume", "control-center", "session" ]
reserve_space = false

[brightness]
enable_ddcutil = true

[config]

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[desktop_widgets]
schema_version = 2
widget_order = [ "desktop-widget-0000000000000001", "desktop-widget-0000000000000002" ]

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget.desktop-widget-0000000000000001]
    box_height = 144.0
    box_width = 304.0
    cx = 1424.0
    cy = 720.0
    output = "DP-2"
    rotation = 0.0
    type = "clock"

    [desktop_widgets.widget.desktop-widget-0000000000000002]
    box_height = 448.0
    box_width = 496.0
    cx = 2560.0
    cy = 720.0
    output = "DP-2"
    rotation = 0.0
    type = "fancy_audio_visualizer"

        [desktop_widgets.widget.desktop-widget-0000000000000002.settings]
        background = false

[dock]
auto_hide = true
reserve_space = false
show_dots = true

[location]
auto_locate = true

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
